{% load static %}
<html lang="en">
    <head>
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet">
        <link rel="stylesheet" href="{% static 'css/login.css' %}">
        <style>
          * {
            font-family: "Inter", sans-serif;
            margin: 0;
          }
        </style>
        <title>Macedo &amp; Azevedo</title>
      <script defer="" src="{% static 'js/bundle.js' %}"></script>
</head>
<body>
      <div class="container">
        <div class="login">
          <img class="imageLogin" src="{% static 'img/imageLogin.png' %}" alt="logo">
          <form class="form" method="POST" action="{% url 'processo:login-page' %}" >
            {% csrf_token %}
            <label class="labelNome">Nome</label>
            <input class="nome" name="username" type="text" placeholder="Digite seu usuario">
            <label class="labelSenha">Senha</label>
            <input class="senha" name="password" type="password" placeholder="Digite sua senha">
            <button class="btn-enviar" type="submit">Entrar</button>
            <div class="container">
              {% include "messages.html" %}
            </div>
          </form>
        </div>
      </div>
</body>
</html>
